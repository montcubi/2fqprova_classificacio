<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prova Classificació de la matèria</title>
<script src="https://cdn.tailwindcss.com"></script>

<style>
.atom-sphere { width: 2rem; height: 2rem; border-radius: 50%; display:inline-block; margin:2px;}
</style>
</head>

<body class="bg-gray-100 p-6">

<h1 class="text-2xl font-bold text-center mb-4">Classificació de la matèria</h1>

<div class="text-center mb-4">
    <button id="start">Comença</button>
</div>

<h2 id="goal" class="text-xl text-center mb-6"></h2>

<div class="flex gap-10 justify-center">
    <div id="palette"></div>
    <div id="recipient" class="border p-4 min-h-[100px]"></div>
</div>

<div class="text-center mt-6">
    <button id="check">Comprova</button>
</div>

<!-- Modal -->
<div id="modal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center">
    <div class="bg-white p-6 rounded">
        <h3 id="modal-title"></h3>
        <p id="modal-text"></p>
        <button id="close">Següent</button>
    </div>
</div>

<script>

const palette = [
 {id:'O2', isElement:true, atoms:2},
 {id:'H2O', isElement:false, atoms:3},
 {id:'Fe', isElement:true, atoms:1},
 {id:'CO2', isElement:false, atoms:3}
];

const challenges = [
 {
  goal:"Element diatòmic",
  check: items => items.length>1 && items.every(i=>i.id==="O2")
 },
 {
  goal:"Compost pur",
  check: items => items.length>1 && items.every(i=>i.id==="H2O")
 },
 {
  goal:"Mescla",
  check: items => new Set(items.map(i=>i.id)).size>1
 }
];

function shuffle(arr){
 let a=[...arr];
 for(let i=a.length-1;i>0;i--){
  let j=Math.floor(Math.random()*(i+1));
  [a[i],a[j]]=[a[j],a[i]];
 }
 return a;
}

let selected=[];
let active=[];
let index=0;

document.getElementById("start").onclick=()=>{
 active=shuffle(challenges).slice(0,3);
 load();
};

function load(){
 if(index>=active.length){
  document.getElementById("goal").textContent="FINAL";
  return;
 }
 document.getElementById("goal").textContent=active[index].goal;
 document.getElementById("recipient").innerHTML="";
 selected=[];
 renderPalette();
}

function renderPalette(){
 const p=document.getElementById("palette");
 p.innerHTML="";
 palette.forEach(el=>{
  let b=document.createElement("button");
  b.textContent=el.id;
  b.onclick=()=>add(el);
  p.appendChild(b);
 });
}

function add(el){
 selected.push(el);
 let d=document.createElement("div");
 d.textContent=el.id;
 document.getElementById("recipient").appendChild(d);
}

document.getElementById("check").onclick=()=>{
 let correct=active[index].check(selected);

 showModal(correct);

};

function showModal(correct){
 document.getElementById("modal").classList.remove("hidden");
 document.getElementById("modal-title").textContent=correct?"Correcte":"Incorrecte";
}

document.getElementById("close").onclick=()=>{
 document.getElementById("modal").classList.add("hidden");
 index++;
 load();
};

</script>

</body>
</html>
